name: Build OpenWrt for ZTE E8820S (v25.12.0 - Custom Config)

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  REPO_URL: https://github.com/dingklikkayu/ZTE-E8820S
  OWRT_BRANCH: v25.12.0
  TOOLCHAIN_URL: https://downloads.openwrt.org/releases/25.12.0/targets/ramips/mt7621/openwrt-toolchain-25.12.0-ramips-mt7621_gcc-14.3.0_musl.Linux-x86_64.tar.zst
  TZ: Asia/Jakarta
  CCACHE_DIR: ${{ github.workspace }}/.ccache

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: 01. Checkout Repository
      uses: actions/checkout@v4

    - name: 02. Cleanup & Initialization Environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell /usr/share/swift /usr/local/.ghcup /usr/lib/jvm
        docker rmi $(docker images -q) || true
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install -y \
          build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
          gettext git libncurses5-dev libssl-dev rsync ccache \
          unzip zlib1g-dev file python3 python3-setuptools python3-dev zstd
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"

    - name: 03. Clone Custom Source & OpenWrt Core
      run: |
        git clone --depth 1 $REPO_URL ZTE-E8820S
        git clone --depth 1 https://github.com/openwrt/openwrt.git -b $OWRT_BRANCH openwrt

    - name: 04. Setup Cache (DL & ccache)
      uses: actions/cache@v4
      with:
        path: |
          openwrt/dl
          ${{ env.CCACHE_DIR }}
        key: ${{ runner.os }}-openwrt-v25.12-${{ hashFiles('openwrt/include/scan.mk') }}-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-openwrt-v25.12-${{ hashFiles('openwrt/include/scan.mk') }}-
          ${{ runner.os }}-openwrt-v25.12-

    - name: 05. Load External Toolchain
      run: |
        cd openwrt
        mkdir -p staging_dir
        curl -L $TOOLCHAIN_URL | tar -I zstd -x -C staging_dir
        TOOLCHAIN_PATH=$(find staging_dir -maxdepth 3 -type d -name "toolchain-*" | head -n 1)
        echo "TOOLCHAIN_ROOT_PATH=$GITHUB_WORKSPACE/openwrt/$TOOLCHAIN_PATH" >> $GITHUB_ENV

    - name: 06. Update & Install Feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: 07. Apply Custom Patches (DTS, LED, Image Config)
      run: |
        cp ZTE-E8820S/patch/mt7621_zte_e8820s.dts openwrt/target/linux/ramips/dts/
        sed -i -e '/^esac/i \\' -e '/^esac/r ZTE-E8820S/patch/leds.txt' openwrt/target/linux/ramips/mt7621/base-files/etc/board.d/01_leds
        cat ZTE-E8820S/patch/zte.txt >> openwrt/target/linux/ramips/image/mt7621.mk
        mkdir -p openwrt/package/base-files/files/etc/uci-defaults
        cp ZTE-E8820S/patch/99-default-settings openwrt/package/base-files/files/etc/uci-defaults/
        chmod +x openwrt/package/base-files/files/etc/uci-defaults/*

    - name: 08. Configuration (Load Custom Config & Inject ccache)
      run: |
        cd openwrt
        curl -sL https://raw.githubusercontent.com/dingklikkayu/ZTE-E8820S/main/patch/configzte8820s > .config
        {
          echo "CONFIG_CCACHE=y"
          echo "CONFIG_CCACHE_DIR=\"$CCACHE_DIR\""
          echo "CONFIG_EXTERNAL_TOOLCHAIN=y"
          echo "CONFIG_TOOLCHAIN_ROOT=\"$TOOLCHAIN_ROOT_PATH\""
        } >> .config
        make defconfig

    - name: 09. Download Package Source
      run: |
        cd openwrt
        make download -j8
        find dl -size -1024c -exec rm -f {} \;

    - name: 10. Compile Firmware
      run: |
        cd openwrt
        echo "Building with $(nproc) threads"
        make -j$(nproc) || make -j1 V=s
        echo "FILE_DATE=$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: 11. Organize Artifacts
      run: |
        mkdir -p release_files
        cp openwrt/bin/targets/ramips/mt7621/*.bin release_files/ || true
        cp openwrt/bin/targets/ramips/mt7621/*.manifest release_files/ || true
        cd release_files
        for file in *; do mv "$file" "${{ env.FILE_DATE }}-$file"; done

    - name: 12. Upload to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ZTE-E8820S-${{ env.FILE_DATE }}
        files: release_files/*
        body: |
          Build OpenWrt ZTE E8820S v25.12.0
          - Config: github.com/dingklikkayu/.../configzte8820s
          - Date: ${{ env.FILE_DATE }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
