name: Build OpenWrt for ZTE E8820S (v25.12.0 - Auto Release)

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  REPO_URL: https://github.com/dingklikkayu/ZTE-E8820S
  OWRT_BRANCH: v25.12.0
  TOOLCHAIN_URL: https://downloads.openwrt.org/releases/25.12.0/targets/ramips/mt7621/openwrt-toolchain-25.12.0-ramips-mt7621_gcc-14.3.0_musl.Linux-x86_64.tar.zst
  TZ: Asia/Jakarta

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Dibutuhkan untuk membuat release

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Cleanup & Initialization
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell /usr/share/swift /usr/local/.ghcup /usr/lib/jvm
        docker rmi $(docker images -q) || true
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install -y \
          build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
          gettext git libncurses5-dev libssl-dev rsync \
          unzip zlib1g-dev file python3 python3-setuptools python3-dev zstd
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo meatimedatectl set-timezone "$TZ"

    - name: Clone Source & OpenWrt
      run: |
        git clone --depth 1 $REPO_URL ZTE-E8820S
        git clone --depth 1 https://github.com/openwrt/openwrt.git -b $OWRT_BRANCH openwrt

    - name: Cache OpenWrt dl
      uses: actions/cache@v4
      with:
        path: openwrt/dl
        key: ${{ runner.os }}-openwrt-dl-${{ hashFiles('openwrt/include/scan.mk') }}
        restore-keys: |
          ${{ runner.os }}-openwrt-dl-

    - name: Load external toolchain
      run: |
        cd openwrt
        mkdir -p staging_dir
        curl -L $TOOLCHAIN_URL | tar -I zstd -x -C staging_dir
        TOOLCHAIN_PATH=$(find staging_dir -maxdepth 3 -type d -name "toolchain-*" | head -n 1)
        echo "TOOLCHAIN_ROOT_PATH=$GITHUB_WORKSPACE/openwrt/$TOOLCHAIN_PATH" >> $GITHUB_ENV

    - name: Update & Install feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Apply Custom Patches
      run: |
        # 1. DTS File
        cp ZTE-E8820S/patch/mt7621_zte_e8820s.dts openwrt/target/linux/ramips/dts/
        # 2. LED Patch
        sed -i -e '/^esac/i \\' -e '/^esac/r ZTE-E8820S/patch/leds.txt' openwrt/target/linux/ramips/mt7621/base-files/etc/board.d/01_leds
        # 3. Image Config
        cat ZTE-E8820S/patch/zte.txt >> openwrt/target/linux/ramips/image/mt7621.mk
        # 4. Default Settings
        mkdir -p openwrt/package/base-files/files/etc/uci-defaults
        cp ZTE-E8820S/patch/99-default-settings openwrt/package/base-files/files/etc/uci-defaults/
        chmod +x openwrt/package/base-files/files/etc/uci-defaults/*

    - name: Configuration
      run: |
        cd openwrt
        
        # 1. Download config buildinfo resmi dari OpenWrt 25.12.0
        curl -sL https://downloads.openwrt.org/releases/25.12.0/targets/ramips/mt7621/config.buildinfo > .config
        
        # 2. Hapus flag multi-device/all-profile agar fokus ke satu device
        # Menghapus CONFIG_TARGET_MULTI_PROFILE, CONFIG_TARGET_PER_DEVICE_ROOTFS, dll.
        sed -i '/CONFIG_TARGET_ramips_mt7621_DEVICE_/d' .config
        sed -i '/CONFIG_TARGET_MULTI_PROFILE/d' .config
        sed -i '/CONFIG_TARGET_ALL_PROFILES/d' .config
        sed -i '/CONFIG_TARGET_DEVICE_PACKAGES_ramips_mt7621/d' .config
        
        # 3. Tambahkan entry spesifik ZTE E8820S dan External Toolchain
        {
          echo "CONFIG_TARGET_ramips=y"
          echo "CONFIG_TARGET_ramips_mt7621=y"
          echo "CONFIG_TARGET_ramips_mt7621_DEVICE_zte_e8820s=y"
          echo "CONFIG_EXTERNAL_TOOLCHAIN=y"
          echo "CONFIG_TOOLCHAIN_ROOT=\"$TOOLCHAIN_ROOT_PATH\""
        } >> .config
        
        # 4. Generate konfigurasi final dan bersihkan dependensi
        make defconfig

    - name: Download package
      run: |
        cd openwrt
        make download -j8
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile the firmware
      run: |
        cd openwrt
        make -j$(nproc) || make -j1 V=s
        echo "FILE_DATE=$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Organize files for Release
      run: |
        mkdir -p release_files
        # Mengambil file factory dan sysupgrade saja
        cp openwrt/bin/targets/ramips/mt7621/*.bin release_files/ || true
        # Menambahkan manifest paket sebagai referensi
        cp openwrt/bin/targets/ramips/mt7621/*.manifest release_files/ || true
        # Berikan nama yang unik agar tidak tertukar
        cd release_files
        for file in *; do mv "$file" "${{ env.FILE_DATE }}-$file"; done

    - name: Upload to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ZTE-E8820S-${{ env.FILE_DATE }}
        files: release_files/*
        body: |
          Firmware OpenWrt ZTE E8820S
          - Build Version: ${{ env.OWRT_BRANCH }}
          - Date: ${{ env.FILE_DATE }}
          - Toolchain: GCC 14.3.0 / Musl
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
