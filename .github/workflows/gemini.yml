name: Build OpenWrt for ZTE E8820S (With Cache)

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  REPO_URL: https://github.com/dingklikkayu/ZTE-E8820S
  REPO_BRANCH: master
  TOOLCHAIN_URL: https://downloads.openwrt.org/releases/25.12.0/targets/ramips/mt7620/openwrt-toolchain-25.12.0-ramips-mt7620_gcc-14.3.0_musl.Linux-x86_64.tar.zst
  TZ: Asia/Jakarta

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Cleanup & Initialization
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell /usr/share/swift /usr/local/.ghcup /usr/lib/jvm
        docker rmi $(docker images -q) || true
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install -y \
          build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
          gettext git libncurses5-dev libssl-dev python3-distutils rsync \
          unzip zlib1g-dev file python3 zstd
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"

    - name: Clone source code
      run: |
        git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt

    # FITUR CACHE: Menyimpan folder 'dl' untuk mempercepat download package
    - name: Cache OpenWrt dl
      uses: actions/cache@v4
      with:
        path: openwrt/dl
        key: ${{ runner.os }}-openwrt-dl-${{ hashFiles('openwrt/include/scan.mk') }}
        restore-keys: |
          ${{ runner.os }}-openwrt-dl-

    - name: Load external toolchain
      run: |
        cd openwrt
        mkdir -p staging_dir
        curl -L $TOOLCHAIN_URL | tar -I zstd -x -C staging_dir
        # Deteksi otomatis folder toolchain
        TOOLCHAIN_PATH=$(find staging_dir -maxdepth 3 -type d -name "toolchain-*" | head -n 1)
        echo "TOOLCHAIN_ROOT_PATH=$GITHUB_WORKSPACE/openwrt/$TOOLCHAIN_PATH" >> $GITHUB_ENV

    - name: Update & Install feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Configuration
      run: |
        cd openwrt
        echo "CONFIG_TARGET_ramips=y" > .config
        echo "CONFIG_TARGET_ramips_mt7620=y" >> .config
        echo "CONFIG_TARGET_ramips_mt7620_DEVICE_zte_e8820s=y" >> .config
        echo "CONFIG_EXTERNAL_TOOLCHAIN=y" >> .config
        echo "CONFIG_TOOLCHAIN_ROOT=\"$TOOLCHAIN_ROOT_PATH\"" >> .config
        make defconfig

    - name: Download package
      run: |
        cd openwrt
        make download -j8
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile the firmware
      run: |
        cd openwrt
        make -j$(nproc) || make -j1 V=s

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: OpenWrt_ZTE_E8820S_25.12
        path: openwrt/bin/targets/ramips/mt7620/
