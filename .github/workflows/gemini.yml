name: Build OpenWrt for ZTE E8820S (v25.12.0 - Complete)

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  REPO_URL: https://github.com/dingklikkayu/ZTE-E8820S
  OWRT_BRANCH: v25.12.0
  # Toolchain ramips mt7621 sesuai target patch Anda
  TOOLCHAIN_URL: https://downloads.openwrt.org/releases/25.12.0/targets/ramips/mt7621/openwrt-toolchain-25.12.0-ramips-mt7621_gcc-14.3.0_musl.Linux-x86_64.tar.zst
  TZ: Asia/Jakarta

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Cleanup & Initialization
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        # Membersihkan bloatware Ubuntu untuk menambah ruang disk (~20GB+)
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell /usr/share/swift /usr/local/.ghcup /usr/lib/jvm
        docker rmi $(docker images -q) || true
        
        sudo -E apt-get -qq update
        # Menggunakan python3-setuptools karena python3-distutils sudah tidak ada di Ubuntu terbaru
        sudo -E apt-get -qq install -y \
          build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
          gettext git libncurses5-dev libssl-dev rsync \
          unzip zlib1g-dev file python3 python3-setuptools python3-dev zstd
          
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"

    - name: Clone Source & OpenWrt
      run: |
        # Clone repo modifikasi (ZTE-E8820S) - Tanpa memaksakan nama branch
        git clone --depth 1 $REPO_URL ZTE-E8820S
        
        # Clone OpenWrt core dengan branch v25.12.0
        git clone --depth 1 https://github.com/openwrt/openwrt.git -b $OWRT_BRANCH openwrt

    - name: Cache OpenWrt dl
      uses: actions/cache@v4
      with:
        path: openwrt/dl
        key: ${{ runner.os }}-openwrt-dl-${{ hashFiles('openwrt/include/scan.mk') }}
        restore-keys: |
          ${{ runner.os }}-openwrt-dl-

    - name: Load external toolchain
      run: |
        cd openwrt
        mkdir -p staging_dir
        # Download toolchain eksternal agar tidak perlu compile dari nol (hemat waktu 1-2 jam)
        curl -L $TOOLCHAIN_URL | tar -I zstd -x -C staging_dir
        
        # Deteksi otomatis folder toolchain yang diekstrak
        TOOLCHAIN_PATH=$(find staging_dir -maxdepth 3 -type d -name "toolchain-*" | head -n 1)
        echo "TOOLCHAIN_ROOT_PATH=$GITHUB_WORKSPACE/openwrt/$TOOLCHAIN_PATH" >> $GITHUB_ENV

    - name: Update & Install feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Apply Custom Patches
      run: |
        # Pastikan folder ZTE-E8820S/patch ada sebelum melakukan copy
        if [ ! -d "ZTE-E8820S/patch" ]; then
          echo "Error: Folder ZTE-E8820S/patch tidak ditemukan!"
          exit 1
        fi

        # 1. DTS File
        cp ZTE-E8820S/patch/mt7621_zte_e8820s.dts openwrt/target/linux/ramips/dts/
        
        # 2. LED Patch
        sed -i -e '/^esac/i \\' -e '/^esac/r ZTE-E8820S/patch/leds.txt' openwrt/target/linux/ramips/mt7621/base-files/etc/board.d/01_leds
        
        # 3. Make configuration
        cat ZTE-E8820S/patch/zte.txt >> openwrt/target/linux/ramips/image/mt7621.mk
        
        # 4. Default Settings (WiFi, SSID, Password)
        mkdir -p openwrt/package/base-files/files/etc/uci-defaults
        cp ZTE-E8820S/patch/99-default-settings openwrt/package/base-files/files/etc/uci-defaults/

    - name: Configuration
      run: |
        cd openwrt
        # Buat file .config dasar untuk ZTE E8820S
        echo "CONFIG_TARGET_ramips=y" > .config
        echo "CONFIG_TARGET_ramips_mt7621=y" >> .config
        echo "CONFIG_TARGET_ramips_mt7621_DEVICE_zte_e8820s=y" >> .config
        
        # Aktifkan penggunaan Toolchain Eksternal
        echo "CONFIG_EXTERNAL_TOOLCHAIN=y" >> .config
        echo "CONFIG_TOOLCHAIN_ROOT=\"$TOOLCHAIN_ROOT_PATH\"" >> .config
        
        # Generate konfigurasi lengkap
        make defconfig

    - name: Download package
      run: |
        cd openwrt
        make download -j8
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile the firmware
      run: |
        cd openwrt
        # Karena toolchain sudah ada, proses ini hanya membangun kernel dan paket
        make -j$(nproc) || make -j1 V=s

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: OpenWrt_ZTE_E8820S_v25.12.0
        path: openwrt/bin/targets/ramips/mt7621/
